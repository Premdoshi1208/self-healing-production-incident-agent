global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "/etc/prometheus/alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "ai-sre-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "host.docker.internal:8000"

  - job_name: "demo-auth-service"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "host.docker.internal:8100"